name: Build & Release Android APK

permissions:
  contents: write

env:
  FORGEJO_SERVER_URL: https://git.sakaloka.id

on:
  # Manual trigger only to prevent quota waste
  workflow_dispatch:
    inputs:
      branch_type:
        description: 'Branch type for version bump'
        required: true
        type: choice
        options:
          - dev
          - main
          - prod

concurrency:
  group: android-apk-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build & Release Android APK
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 1️⃣ Checkout
      # ------------------------------------------------------------
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 2️⃣ Setup Node.js
      # ------------------------------------------------------------
      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ------------------------------------------------------------
      # 3️⃣ Setup pnpm with cache
      # ------------------------------------------------------------
      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # ------------------------------------------------------------
      # 4️⃣ Install dependencies
      # ------------------------------------------------------------
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      # ------------------------------------------------------------
      # 5️⃣ Setup Java 17
      # ------------------------------------------------------------
      - name: 🏗 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ------------------------------------------------------------
      # 6️⃣ Setup Android SDK with cache
      # ------------------------------------------------------------
      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ------------------------------------------------------------
      # 7️⃣ Bump version based on branch
      # ------------------------------------------------------------
      - name: 🔢 Bump version
        id: version
        run: |
          set -euo pipefail

          VERSION=$(cat .version)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BRANCH="${{ github.event.inputs.branch_type }}"

          echo "Current version: $VERSION"
          echo "Branch type: $BRANCH"

          if [ "$BRANCH" = "dev" ]; then
            PATCH=$((PATCH + 1))
          elif [ "$BRANCH" = "main" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$BRANCH" = "prod" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          else
            echo "❌ Unsupported branch: $BRANCH"
            exit 1
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "$NEW_VERSION" > .version

          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------
      # 8️⃣ Sync version → app.json
      # ------------------------------------------------------------
      - name: 🔄 Sync version to app.json
        run: |
          set -euo pipefail

          VERSION=$(cat .version)
          VERSION_CODE=$(echo "$VERSION" | awk -F. '{print $1 * 10000 + $2 * 100 + $3}')

          echo "Syncing version $VERSION"
          echo "Computed android.versionCode: $VERSION_CODE"

          jq \
            --arg version "$VERSION" \
            --argjson versionCode "$VERSION_CODE" \
            '.expo.version = $version
             | .expo.android.versionCode = $versionCode' \
            app.json > app.json.tmp

          mv app.json.tmp app.json

      # ------------------------------------------------------------
      # 9️⃣ Commit version bump
      # ------------------------------------------------------------
      - name: 💾 Commit version bump
        run: |
          git config user.name "forgejo-actions"
          git config user.email "forgejo-actions@sakaloka.id"

          git add .version app.json
          git commit -m "chore(release): v$(cat .version)" || echo "No changes to commit"
          git push

      # ------------------------------------------------------------
      # 🔟 Prebuild assets (sync icons, splash, etc.)
      # ------------------------------------------------------------
      - name: 🎨 Prebuild Expo assets
        run: npx expo prebuild --platform android --no-install

      # ------------------------------------------------------------
      # 1️⃣1️⃣ Clear Metro bundler cache
      # ------------------------------------------------------------
      - name: 🧹 Clear Metro cache
        run: |
          rm -rf $TMPDIR/metro-* || true
          rm -rf $TMPDIR/haste-* || true

      # ------------------------------------------------------------
      # 1️⃣2️⃣ Build APK with Gradle
      # ------------------------------------------------------------
      - name: 🚀 Build Android APK
        run: |
          set -euo pipefail

          VERSION=$(cat .version)
          echo "Building APK version $VERSION"

          # Set API URL based on branch_type
          if [ "${{ github.event.inputs.branch_type }}" = "prod" ]; then
            export EXPO_PUBLIC_API_URL="https://api-pos-damai.riyansolusi.com"
          elif [ "${{ github.event.inputs.branch_type }}" = "main" ]; then
            export EXPO_PUBLIC_API_URL="https://api-sit-pos-damai.riyansolusi.com"
          else
            export EXPO_PUBLIC_API_URL="https://api-dev-pos-damai.riyansolusi.com"
          fi
          echo "Using API_URL: $EXPO_PUBLIC_API_URL"

          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

          cd ..

          # Find the APK
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found"
            exit 1
          fi

          # Rename APK
          APK_NAME="pos-damai-v$VERSION.apk"
          cp "$APK_PATH" "$APK_NAME"

          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

          # Show APK size
          ls -lh "$APK_NAME"

      # ------------------------------------------------------------
      # 1️⃣3️⃣ Generate changelog
      # ------------------------------------------------------------
      - name: 📝 Generate changelog
        id: changelog
        run: |
          set -euo pipefail

          LAST_TAG=$(git tag --sort=-creatordate | grep '^v' | head -n 1 || true)

          if [ -z "$LAST_TAG" ]; then
            RANGE=""
            echo "No previous tag found, using all commits"
          else
            RANGE="$LAST_TAG..HEAD"
            echo "Generating changelog from $RANGE"
          fi

          git log $RANGE --pretty=format:"%s" > commits.txt

          {
            echo "## ✨ Features"
            grep '^feat:' commits.txt | sed 's/^feat: /* /' || true
            echo ""

            echo "## 🐛 Bug Fixes"
            grep '^fix:' commits.txt | sed 's/^fix: /* /' || true
            echo ""

            echo "## 🧹 Refactor"
            grep '^refactor:' commits.txt | sed 's/^refactor: /* /' || true
            echo ""

            echo "## 🔧 Chore"
            grep '^chore:' commits.txt | sed 's/^chore: /* /' || true
            echo ""

            echo "## 📚 Others"
            grep -vE '^(feat|fix|refactor|chore|docs):' commits.txt | sed 's/^/* /' || true
          } > CHANGELOG.md

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------
      # 1️⃣4️⃣ Create ForgeJo Release
      # ------------------------------------------------------------
      - name: 📦 Create ForgeJo Release
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          direction: upload
          url: https://git.sakaloka.id
          repo: ${{ github.repository }}
          token: ${{ secrets.FORGEJO_TOKEN }}
          tag: v${{ steps.version.outputs.version }}
          release-dir: .
          release-notes: |
            🚀 **POS Damai – Android APK**

            - Version: `v${{ steps.version.outputs.version }}`
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Android versionCode: auto-generated
            - Build: Local Gradle (ForgeJo Actions)

            📥 Download APK below and install manually (sideload).
