name: EAS Build & Release APK

on:
  push:
    branches:
      - main
      - master
      - dev
      - develop
  workflow_dispatch:

concurrency:
  group: eas-apk-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Setup pnpm
      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 4️⃣ Install dependencies
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      # 5️⃣ Setup Expo & EAS
      - name: 🏗 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # 6️⃣ Build APK (WAIT until finished)
      - name: 🚀 Build Android APK
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json > build-result.json

      # 7️⃣ Download APK from EAS
      - name: 📥 Download APK from EAS
        run: |
          APK_URL=$(jq -r '.[0].artifacts.buildUrl' build-result.json)
          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "❌ APK URL not found"
            cat build-result.json
            exit 1
          fi
          echo "Downloading APK from $APK_URL"
          curl -L "$APK_URL" -o pos-damai.apk

      # 8️⃣ Create GitHub Release
      - name: 📦 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: POS Damai APK #${{ github.run_number }}
          body: |
            🚀 **POS Damai – Android APK**

            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Build: `${{ github.run_number }}`

            📥 Download APK and install manually (sideload).
          files: pos-damai.apk
