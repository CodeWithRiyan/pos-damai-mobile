name: EAS Build (Development)

on:
  push:
    branches:
      - dev
      - develop
  workflow_dispatch:

concurrency:
  group: eas-build-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Development APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Build Development APK
        run: eas build --profile development --platform android --non-interactive --no-wait

      - name: 📝 Build Summary
        run: |
          echo "## 🎉 Development Build Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build has been submitted to EAS." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the build status at: https://expo.dev/accounts/${{ secrets.EXPO_ACCOUNT }}/projects/pos-damai/builds" >> $GITHUB_STEP_SUMMARY
